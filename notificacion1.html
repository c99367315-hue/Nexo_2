<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEXO - Restaurantes</title>
  <link rel="stylesheet" href="notificacion1.css">
</head>
<body>

  <div class="phone-frame">
    <!-- Cámara -->
    <div class="camera-notch">
      <div class="camera"></div>
    </div>

    <!-- Pantalla -->
    <div class="phone-screen">

      <!-- Barra de estado -->
      <div class="status-bar">
        <span>11:52</span>
        <span>5G • 89%</span>
      </div>

      <!-- Header -->
      <div class="header-rest">
        <h1 class="screen-title">Restaurantes</h1>
        <div class="settings-icon">⚙️</div>
      </div>

      <!-- Contenido principal -->
      <div class="main-content">
        <div class="promo-card">
          <div class="promo-content">
            <h2>¡Sí, sí! llegó tardes felices y disfrútalo comiendo pollo, pero que sea de Frisby</h2>
            
            <img src="https://via.placeholder.com/340x190/FF6B00/FFFFFF?text=FRISBY+TARDES+FELICES" 
                 alt="Frisby Promo" class="promo-image">

            <button class="know-more">conoce mas</button>
          </div>
        </div>
      </div>

      <!-- Barra de navegación inferior -->
      <div class="bottom-nav">
        <div class="nav-item active">🏠</div>
        <div class="nav-item">🔍</div>
        <div class="nav-item">🛎️</div>
        <div class="nav-item">🛒</div>
      </div>

    </div>
  </div>

</body>
</html>
