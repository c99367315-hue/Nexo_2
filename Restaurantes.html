<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEXO - Restaurantes</title>
  <link rel="stylesheet" href="Restaurantes.css">
</head>
<body>
  
  <div class="container restaurants-page">
    <div class="header">
      <h1>NEXO</h1>
      <h2>Restaurantes</h2>
    </div>

    <div class="search-bar">
      <input type="text" placeholder="Buscar restaurantes o comidas...">
    </div>

    <div class="brands-grid">
      <div class="brand-card">
        <img src="https://via.placeholder.com/150/FFCC00/000000?text=McD" alt="McDonalds">
        <p>McDonald's</p>
      </div>
      <div class="brand-card">
        <img src="https://via.placeholder.com/150/FF0000/FFFFFF?text=SR" alt="Santa Rosa">
        <p>Santa Rosa</p>
      </div>
      <div class="brand-card">
        <img src="https://via.placeholder.com/150/FF6600/FFFFFF?text=FRISBY" alt="Frisby">
        <p>Frisby</p>
      </div>
      <div class="brand-card">
        <img src="https://via.placeholder.com/150/00CC00/FFFFFF?text=SUBWAY" alt="Subway">
        <p>Subway</p>
      </div>
      <div class="brand-card">
        <img src="https://via.placeholder.com/150/FF0000/FFFFFF?text=KFC" alt="KFC">
        <p>KFC</p>
      </div>
      <div class="brand-card">
        <img src="https://via.placeholder.com/150/FF0000/FFFFFF?text=PH" alt="Pizza Hut">
        <p>Pizza Hut</p>
      </div>
    </div>

    <div class="section">
      <h3>Promociones del día</h3>
      <div class="promo-grid">
        <div class="promo-item">
          <div class="promo-tag">20% OFF</div>
          <h4>Combo Familiar Frisby</h4>
          <p>$89.900</p>
        </div>
        <div class="promo-item">
          <div class="promo-tag">Nuevo</div>
          <h4>McCombo + McFlurry</h4>
          <p>$45.900</p>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
